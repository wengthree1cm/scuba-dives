<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>潜点天气与海况查询</title>
  <link rel="stylesheet" href="./conditions.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <header class="topbar">
    <h1>潜点天气与海况查询</h1>
    <a href="index.html" class="link">返回主页</a>
  </header>

  <section class="search">
    <div class="field">
      <label>地点搜索</label>
      <input id="q" type="text" placeholder="输入城市或潜点名称">
      <div id="suggest" class="suggest"></div>
    </div>
    <div class="field">
      <label>开始日期</label>
      <input id="date" type="date">
    </div>
    <div class="field">
      <label>天数</label>
      <select id="days">
        <option value="1">只看当天</option>
        <option value="3">三天</option>
        <option value="5">五天</option>
        <option value="7">七天</option>
      </select>
    </div>
    <button id="btn">查询</button>
  </section>

  <section class="layout">
    <div id="map"></div>
    <div class="cards">
      <div class="card" id="summary">
        <h3>概览</h3>
        <div id="summaryBody">请输入地点并查询</div>
      </div>
      <div class="card">
        <h3>每日概况</h3>
        <div id="daily"></div>
      </div>
      <div class="card">
        <h3>逐小时数据</h3>
        <div id="hourly"></div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./config.js"></script>
  <script src="./conditions.js"></script>
</body>
</html>
